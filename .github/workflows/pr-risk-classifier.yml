name: PR Risk Classifier

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  classify:
    name: Classify PR risk, reviews, and CI lanes
    runs-on: ubuntu-latest
    outputs:
      risk_class: ${{ steps.read.outputs.risk_class }}
      complexity_class: ${{ steps.read.outputs.complexity_class }}
      token_class: ${{ steps.read.outputs.token_class }}
      allowed_to_mark_ready: ${{ steps.read.outputs.allowed_to_mark_ready }}
      impacted_surfaces: ${{ steps.read.outputs.impacted_surfaces }}
      protected_flags: ${{ steps.read.outputs.protected_flags }}
      required_ci_lanes: ${{ steps.read.outputs.required_ci_lanes }}
      required_reviews: ${{ steps.read.outputs.required_reviews }}
      merge_blocking_conditions: ${{ steps.read.outputs.merge_blocking_conditions }}
      secondary_review_required: ${{ steps.read.outputs.secondary_review_required }}
      adversarial_review_required: ${{ steps.read.outputs.adversarial_review_required }}
      opposite_provider_required: ${{ steps.read.outputs.opposite_provider_required }}
      human_gate_required: ${{ steps.read.outputs.human_gate_required }}
      founder_review_required: ${{ steps.read.outputs.founder_review_required }}
      runtime_payload_contract_present: ${{ steps.read.outputs.runtime_payload_contract_present }}
      blocker_exemption_present: ${{ steps.read.outputs.blocker_exemption_present }}
      body_and_classification_ready: ${{ steps.read.outputs.body_and_classification_ready }}
      review_ready: ${{ steps.read.outputs.review_ready }}
      merge_ready: ${{ steps.read.outputs.merge_ready }}
    steps:
      - name: Checkout PR head for diff context
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          repository: neoengine-ai-org/hermes-agent
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: pr-head

      - name: Checkout trusted base classifier
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          repository: neoengine-ai-org/hermes-agent
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          path: trusted-classifier

      - name: Write PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > pr-body.md

      - name: Run trusted base classifier
        id: base_classify
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_REPOSITORY: neoengine-ai-org/hermes-agent
        run: |
          cd pr-head
          python ../trusted-classifier/scripts/ci_risk_classifier.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --pr-body ../pr-body.md \
            --repo neoengine-ai-org/hermes-agent \
            --pr-number "${{ github.event.pull_request.number }}" \
            --output-dir ../base-classification

      - name: Run PR-head classifier for telemetry only
        id: head_classify
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_REPOSITORY: neoengine-ai-org/hermes-agent
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CLASSIFIER_COMMIT: ${{ github.event.pull_request.head.sha }}
        run: |
          cd pr-head
          python scripts/ci_risk_classifier.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --pr-body ../pr-body.md \
            --repo neoengine-ai-org/hermes-agent \
            --pr-number "${{ github.event.pull_request.number }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --classifier-commit "${{ github.event.pull_request.head.sha }}" \
            --output-dir ../head-classification

      - name: Finalize trusted classification artifacts
        id: classify
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_REPOSITORY: neoengine-ai-org/hermes-agent
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CLASSIFIER_COMMIT: ${{ github.event.pull_request.base.sha }}
        run: |
          cd pr-head
          if python ../trusted-classifier/scripts/ci_risk_classifier.py --help | grep -q -- '--base-classification'; then
            FINALIZER=../trusted-classifier/scripts/ci_risk_classifier.py
          else
            # Bootstrap compatibility for the PR that introduces trusted finalization:
            # the risk/CI decision comes from ../base-classification, while the
            # PR-head script only wraps that trusted result with new metadata. Do
            # not allow this path for later PRs; once PR #7 lands, the trusted
            # base classifier must provide --base-classification itself.
            if [ "${{ github.event.pull_request.number }}" != "7" ]; then
              echo "::error::trusted base classifier lacks --base-classification; refusing PR-head finalizer"
              python - <<'PY'
          import json
          import os
          from pathlib import Path

          blocker = "trusted_base_classifier_lacks_finalization_support"
          data = {
              "schema_version": "ci-classification.v1",
              "repo": "neoengine-ai-org/hermes-agent",
              "pr_number": os.environ["PR_NUMBER"],
              "title": os.environ["PR_TITLE"],
              "risk_class": "R3",
              "complexity_class": "C3",
              "impacted_surfaces": ["ci_workflow"],
              "protected_flags": [],
              "runtime_payload_contract_present": False,
              "blocker_exemption_present": False,
              "required_ci_lanes": ["pr_body_contract", "diff_check", "workflow_lint", "governance_required"],
              "optional_ci_lanes": [],
              "skipped_ci_lanes": [],
              "required_reviews": ["secondary_review_required", "adversarial_review_required", "opposite_provider_adversarial_required"],
              "secondary_review_required": True,
              "adversarial_review_required": True,
              "opposite_provider_required": True,
              "human_gate_required": False,
              "founder_review_required": False,
              "reason": "Fail-closed: trusted base classifier cannot finalize trusted execution metadata.",
              "token_class": "L",
              "merge_blocking_conditions": [blocker],
              "body_and_classification_ready": False,
              "review_ready": False,
              "merge_ready": False,
              "allowed_to_mark_ready": False,
              "classifier_execution": {
                  "trusted_source": "base",
                  "repo": "neoengine-ai-org/hermes-agent",
                  "pr_number": os.environ["PR_NUMBER"],
                  "base_sha": os.environ["GITHUB_BASE_SHA"],
                  "head_sha": os.environ["GITHUB_HEAD_SHA"],
                  "classifier_commit": os.environ["GITHUB_BASE_SHA"],
                  "classifier_self_change": True,
                  "base_classifier_result": {},
                  "head_classifier_result": {},
                  "weakened_by_head_classifier": False,
                  "head_classifier_weakenings": [],
              },
          }
          Path("..").joinpath("ci-classification.json").write_text(json.dumps(data, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          lines = ["# CI Classification", ""] + [f"- {key}: {value}" for key, value in data.items() if key != "classifier_execution"]
          Path("..").joinpath("ci-classification.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          matrix = {
              "schema_version": "ci-downstream-matrix-dry-run.v1",
              "repo": "neoengine-ai-org/hermes-agent",
              "pr_number": os.environ["PR_NUMBER"],
              "enforced": False,
              "non_claims": ["dry_run_only", "not_downstream_ci_matrix_enforced", "not_cross_repo_propagated"],
              "readiness": {
                  "body_and_classification_ready": False,
                  "review_ready": False,
                  "merge_ready": False,
              },
              "include": [{"lane": lane, "required": True, "dry_run_only": True} for lane in data["required_ci_lanes"]],
          }
          Path("..").joinpath("downstream-matrix.json").write_text(json.dumps(matrix, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
              exit 2
            fi
            FINALIZER=scripts/ci_risk_classifier.py
          fi
          python "$FINALIZER" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --base-classification ../base-classification/ci-classification.json \
            --compare-head-classification ../head-classification/ci-classification.json \
            --repo neoengine-ai-org/hermes-agent \
            --pr-number "${{ github.event.pull_request.number }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --classifier-commit "${{ github.event.pull_request.base.sha }}" \
            --output-dir ..

      - name: Backfill dry-run downstream output artifacts
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          classification_path = Path('ci-classification.json')
          if not classification_path.exists():
              raise SystemExit(0)
          data = json.loads(classification_path.read_text(encoding='utf-8'))
          merge_ready = bool(data.get('allowed_to_mark_ready', False)) and not data.get('merge_blocking_conditions', [])
          data.setdefault('body_and_classification_ready', merge_ready)
          data.setdefault('review_ready', merge_ready)
          data.setdefault('merge_ready', merge_ready)
          classification_path.write_text(json.dumps(data, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          required = data.get('required_ci_lanes', []) if isinstance(data.get('required_ci_lanes', []), list) else []
          optional = data.get('optional_ci_lanes', []) if isinstance(data.get('optional_ci_lanes', []), list) else []
          matrix = {
              'schema_version': 'ci-downstream-matrix-dry-run.v1',
              'repo': data.get('repo', 'unknown'),
              'pr_number': data.get('pr_number', 'unknown'),
              'enforced': False,
              'non_claims': [
                  'dry_run_only',
                  'not_downstream_ci_matrix_enforced',
                  'not_cross_repo_propagated',
                  'not_support_or_marketing_classifier_implemented',
              ],
              'readiness': {
                  'body_and_classification_ready': bool(data.get('body_and_classification_ready', False)),
                  'review_ready': bool(data.get('review_ready', False)),
                  'merge_ready': bool(data.get('merge_ready', False)),
              },
              'include': [
                  {'lane': str(lane), 'required': True, 'dry_run_only': True} for lane in required
              ] + [
                  {'lane': str(lane), 'required': False, 'dry_run_only': True} for lane in optional
              ],
          }
          Path('downstream-matrix.json').write_text(json.dumps(matrix, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Enforce tier review satisfaction
        if: always()
        run: |
          if [ ! -f ci-classification.json ]; then
            echo "::warning::ci-classification.json missing; skipping review receipt validation"
            exit 0
          fi
          if [ -f trusted-classifier/scripts/review_receipt_validator.py ]; then
            VALIDATOR=trusted-classifier/scripts/review_receipt_validator.py
            echo trusted-base > review-receipt-validator-source.txt
          else
            # Bootstrap compatibility for PR #9: emit review receipt telemetry,
            # but do not mutate trusted classification/downstream readiness from
            # a PR-head validator result.
            VALIDATOR=pr-head/scripts/review_receipt_validator.py
            echo pr-head-bootstrap-telemetry > review-receipt-validator-source.txt
          fi
          if python "$VALIDATOR" --help | grep -q -- '--enforce'; then
            ENFORCE_ARGS=(--enforce)
          else
            # Bootstrap compatibility for cc-review-tier4-merge-gate-v1. Before
            # this PR lands, the trusted base validator cannot enforce the new
            # Tier-4 satisfaction contract. Only this bootstrap PR may use the
            # PR-head validator to prove the new gate; later PRs fail closed until
            # their base branch already contains --enforce.
            if [ "${{ github.event.pull_request.number }}" != "__BOOTSTRAP_PR_NUMBER__" ]; then
              echo "::error::trusted review receipt validator lacks --enforce; refusing non-bootstrap PR"
              exit 2
            fi
            VALIDATOR=pr-head/scripts/review_receipt_validator.py
            echo pr-head-bootstrap-enforcement > review-receipt-validator-source.txt
            ENFORCE_ARGS=(--enforce)
          fi
          python "$VALIDATOR" \
            --classification ci-classification.json \
            --pr-body pr-body.md \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --primary-provider codex \
            --output-dir . \
            "${ENFORCE_ARGS[@]}"

      - name: Backfill dry-run review readiness outputs
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          classification_path = Path('ci-classification.json')
          receipts_path = Path('review-receipts.json')
          source_path = Path('review-receipt-validator-source.txt')
          matrix_path = Path('downstream-matrix.json')
          if not classification_path.exists() or not receipts_path.exists():
              raise SystemExit(0)
          if source_path.read_text(encoding='utf-8').strip() != 'trusted-base':
              print('Skipping trusted readiness backfill for untrusted bootstrap review validator')
              raise SystemExit(0)
          classification = json.loads(classification_path.read_text(encoding='utf-8'))
          receipts = json.loads(receipts_path.read_text(encoding='utf-8'))
          body_ready = bool(classification.get('body_and_classification_ready', False))
          review_ready = bool(receipts.get('review_ready', False))
          merge_blockers = classification.get('merge_blocking_conditions', [])
          classification['review_ready'] = review_ready
          classification['merge_ready'] = body_ready and review_ready and not merge_blockers
          classification['review_receipt_validation'] = {
              'schema_version': receipts.get('schema_version'),
              'enforced': receipts.get('enforced', False),
              'evidence_verification_mode': receipts.get('evidence_verification_mode'),
              'non_claims': receipts.get('non_claims', []),
              'review_ready_dry_run': review_ready,
              'merge_ready_dry_run': body_ready and review_ready and not merge_blockers,
              'required_review_types': receipts.get('required_review_types', []),
              'missing_required_review_types': receipts.get('missing_required_review_types', []),
              'invalid_receipt_reasons': receipts.get('invalid_receipt_reasons', []),
          }
          classification_path.write_text(json.dumps(classification, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          if matrix_path.exists():
              matrix = json.loads(matrix_path.read_text(encoding='utf-8'))
              matrix['readiness'] = {
                  'body_and_classification_ready': body_ready,
                  'review_ready': review_ready,
                  'merge_ready': classification['merge_ready'],
              }
              matrix_path.write_text(json.dumps(matrix, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Emit Hermes dispatch advisory dry-run
        if: always()
        run: |
          if [ ! -f ci-classification.json ]; then
            echo "::warning::ci-classification.json missing; skipping Hermes dispatch advisory"
            exit 0
          fi
          if [ -f trusted-classifier/scripts/dispatch_advisory.py ]; then
            DISPATCH_ADVISOR=trusted-classifier/scripts/dispatch_advisory.py
            echo trusted-base > hermes-dispatch-advisory-source.txt
          else
            # Bootstrap compatibility for PR #10: emit advisory telemetry from
            # the PR-head dispatcher consumer, but do not mutate trusted
            # classifier/review/downstream readiness or dispatch agents.
            DISPATCH_ADVISOR=pr-head/scripts/dispatch_advisory.py
            echo pr-head-bootstrap-telemetry > hermes-dispatch-advisory-source.txt
          fi
          ARGS=(--classification ci-classification.json --output-dir .)
          if [ -f review-receipts.json ]; then
            ARGS+=(--review-receipts review-receipts.json)
          fi
          if [ -f downstream-matrix.json ]; then
            ARGS+=(--downstream-matrix downstream-matrix.json)
          fi
          python "$DISPATCH_ADVISOR" "${ARGS[@]}"

      - name: Read outputs
        id: read
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          data = json.loads(Path('ci-classification.json').read_text(encoding='utf-8'))
          for key in (
              'risk_class',
              'complexity_class',
              'token_class',
              'allowed_to_mark_ready',
              'secondary_review_required',
              'adversarial_review_required',
              'opposite_provider_required',
              'human_gate_required',
              'founder_review_required',
              'runtime_payload_contract_present',
              'blocker_exemption_present',
              'body_and_classification_ready',
              'review_ready',
              'merge_ready',
          ):
              print(f"{key}={str(data[key]).lower() if isinstance(data[key], bool) else data[key]}")
          for key in ('impacted_surfaces', 'protected_flags', 'required_ci_lanes', 'required_reviews', 'merge_blocking_conditions'):
              print(f"{key}=" + ','.join(data[key]))
          PY

      - name: Upload trusted classification artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-classification
          path: |
            ci-classification.json
            ci-classification.md
            downstream-matrix.json
            review-receipts.json
            review-receipts.md
            review-receipt-validator-source.txt
            hermes-dispatch-advisory.json
            hermes-dispatch-advisory.md
            hermes-dispatch-advisory-source.txt
          if-no-files-found: error

      - name: Upload base classifier artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-classification-base-authoritative
          path: |
            base-classification/ci-classification.json
            base-classification/ci-classification.md
            base-classification/downstream-matrix.json
          if-no-files-found: warn

      - name: Upload head classifier telemetry artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-classification-head-telemetry
          path: |
            head-classification/ci-classification.json
            head-classification/ci-classification.md
            head-classification/downstream-matrix.json
          if-no-files-found: warn
